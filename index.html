<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JM Solutionss - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .metric-value { font-size: 28px; font-weight: 700; margin: 8px 0; color: var(--color-text-heading); }
    .metric-label { font-size: 14px; color: var(--color-text-body); font-weight: 600; }
    .metric-change { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    
    .transaction-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--color-border); }
    .transaction-row:last-child { border-bottom: none; padding-bottom: 0; }
    
    .tx-user { display: flex; align-items: center; gap: 12px; }
    .tx-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--color-bg); display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--color-primary); }
    
    .progress-bar-container { width: 100%; height: 8px; background: var(--color-bg); border-radius: 4px; overflow: hidden; margin-top: 12px; }
    .progress-bar-fill { height: 100%; background: var(--color-primary); border-radius: 4px; transition: width 0.3s ease; }
    
    .card-preview { background: linear-gradient(135deg, var(--color-navy) 0%, var(--color-primary) 100%); color: white; padding: 20px; border-radius: 12px; margin-top: 16px; position: relative; overflow: hidden; }
    .card-preview::after { content: ''; position: absolute; width: 200px; height: 200px; background: rgba(255,255,255,0.05); border-radius: 50%; top: -50px; right: -50px; }
  </style>
</head>
<body>
  <div id="app-layout">
    <!-- Inner Content Area -->
    <div style="width: 100%;">
      <div class="flex justify-between items-center mb-4">
        <h2>Dashboard Overview</h2>
        <div class="btn btn-secondary">
          <i class="far fa-calendar-alt"></i> This Month <i class="fas fa-chevron-down text-small"></i>
        </div>
      </div>

      <!-- Key Metrics -->
      <div class="grid grid-cols-4 mb-4">
        <div class="card" id="metric-balance">
          <div class="metric-label">Total Balance</div>
          <div class="metric-value">$0.00</div>
          <div class="metric-change text-success"><i class="fas fa-arrow-up"></i> 0%</div>
        </div>
        <div class="card" id="metric-income">
          <div class="metric-label">Total Income</div>
          <div class="metric-value">$0.00</div>
          <div class="metric-change text-success"><i class="fas fa-arrow-up"></i> 0%</div>
        </div>
        <div class="card" id="metric-expense">
          <div class="metric-label">Total Expense</div>
          <div class="metric-value">$0.00</div>
          <div class="metric-change text-danger"><i class="fas fa-arrow-down"></i> 0%</div>
        </div>
        <div class="card" id="metric-savings">
          <div class="metric-label">Total Savings</div>
          <div class="metric-value">$0.00</div>
          <div class="metric-change text-success"><i class="fas fa-arrow-up"></i> 0%</div>
        </div>
      </div>

      <!-- Charts Section -->
      <div class="grid grid-cols-2 mb-4">
        <div class="card">
          <div class="flex justify-between items-center mb-4">
            <h3>Total Income</h3>
            <select class="form-control" style="width: auto; padding: 6px 12px; font-size: 14px;">
              <option>This Year</option>
              <option>Last 6 Months</option>
            </select>
          </div>
          <div style="position: relative; height: 250px; width: 100%;">
            <canvas id="incomeChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="flex justify-between items-center mb-4">
            <h3>Budget Allocation</h3>
            <select class="form-control" style="width: auto; padding: 6px 12px; font-size: 14px;">
              <option>This Month</option>
            </select>
          </div>
          <div style="position: relative; height: 250px; display: flex; justify-content: center;">
            <canvas id="budgetChart"></canvas>
            <div id="budget-center-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none;">
              <div class="text-caption">Spent / Total</div>
              <div style="font-weight: 700; font-size: 18px;" id="budget-center-value">$0 / $0</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Lower Section -->
      <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 32px;">
        <div class="card">
          <div class="flex justify-between items-center mb-4">
            <h3>Recent Transactions</h3>
            <a href="transactions.html" class="text-small" style="color: var(--color-primary); font-weight: 600;">See all <i class="fas fa-arrow-right"></i></a>
          </div>
          <div id="recent-transactions-list">
            <!-- Rendered via JS -->
          </div>
        </div>
        
        <div class="flex flex-col gap-4">
          <div class="card">
            <h3>Spending Limits</h3>
            <p class="text-small" style="color: var(--color-text-body); margin-top: 8px;">Monthly Payment Limit</p>
            <div class="metric-value" style="font-size: 24px;" id="spending-limit-text">$0.00 / $0.00</div>
            <div class="progress-bar-container">
              <div class="progress-bar-fill" id="spending-limit-bar" style="width: 0%;"></div>
            </div>
            <p class="text-caption" style="margin-top: 8px; text-align: right;" id="spending-limit-perc">0% used</p>
          </div>
          
          <div class="card">
            <div class="flex justify-between items-center">
              <h3>My Cards</h3>
              <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 12px;"><i class="fas fa-plus"></i></button>
            </div>
            <div id="my-cards-container">
              <!-- Rendered via JS -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="store.js"></script>
  <script src="layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
