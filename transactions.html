<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JM Solutionss - Transactions</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .filter-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-input { display: flex; align-items: center; background: var(--color-white); border: 1px solid var(--color-border); border-radius: var(--border-radius-btn); padding: 8px 16px; }
    .filter-input input, .filter-input select { border: none; outline: none; background: transparent; margin-left: 8px; font-family: var(--font-main); font-size: 14px; }
    
    .tx-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--color-bg); display: inline-flex; align-items: center; justify-content: center; font-weight: 600; color: var(--color-primary); font-size: 12px; margin-right: 12px; vertical-align: middle; }
    
    .action-btn { background: none; border: none; cursor: pointer; color: var(--color-text-body); margin: 0 4px; font-size: 16px; transition: color 0.2s; }
    .action-btn:hover { color: var(--color-primary); }
    .action-btn.delete:hover { color: var(--color-danger); }
  </style>
</head>
<body>
  <div id="app-layout">
    <!-- Inner Content Area -->
    <div style="width: 100%;">
      <div class="flex justify-between items-center mb-4">
        <h2>Transactions</h2>
        <button class="btn btn-primary" onclick="window.openTransactionModal()"><i class="fas fa-plus"></i> Add Transaction</button>
      </div>

      <div class="card">
        <div class="filter-bar">
          <div class="filter-input" style="flex: 1;">
            <i class="fas fa-search text-small" style="color: var(--color-text-body)"></i>
            <input type="text" id="search-input" placeholder="Search by name, ID, or notes..." style="width: 100%;">
          </div>
          <div class="filter-input">
            <select id="filter-type">
              <option value="all">All Types</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>
          <div class="filter-input">
            <select id="filter-status">
              <option value="all">All Statuses</option>
              <option value="completed">Completed</option>
              <option value="pending">Pending</option>
              <option value="failed">Failed</option>
            </select>
          </div>
          <div class="filter-input">
            <select id="sort-by">
              <option value="date-desc">Newest First</option>
              <option value="date-asc">Oldest First</option>
              <option value="amount-desc">Amount (High to Low)</option>
              <option value="amount-asc">Amount (Low to High)</option>
            </select>
          </div>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Recipient / Source</th>
                <th>Transaction ID</th>
                <th>Category</th>
                <th>Date & Time</th>
                <th>Status</th>
                <th style="text-align: right;">Amount</th>
                <th style="text-align: center;">Actions</th>
              </tr>
            </thead>
            <tbody id="transactions-table-body">
              <!-- Rendered via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Transaction Modal -->
  <div class="modal-overlay" id="transaction-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Add Transaction</h3>
        <i class="fas fa-times modal-close" onclick="closeTransactionModal()"></i>
      </div>
      <form id="transaction-form">
        <input type="hidden" id="tx-id">
        <div class="grid grid-cols-2">
          <div class="form-group">
            <label class="form-label">Type</label>
            <select class="form-control" id="tx-type" required>
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Amount</label>
            <input type="number" class="form-control" id="tx-amount" min="0.01" step="0.01" required>
          </div>
        </div>
        
        <div class="grid grid-cols-2">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-control" id="tx-category" required>
              <!-- Populated dynamically -->
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-control" id="tx-status" required>
              <option value="completed">Completed</option>
              <option value="pending">Pending</option>
              <option value="failed">Failed</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Recipient / Source Name</label>
          <input type="text" class="form-control" id="tx-name" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="datetime-local" class="form-control" id="tx-date" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Notes (Optional)</label>
          <input type="text" class="form-control" id="tx-notes">
        </div>
        
        <div class="flex justify-between" style="margin-top: 32px;">
          <button type="button" class="btn btn-secondary" onclick="closeTransactionModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Transaction</button>
        </div>
      </form>
    </div>
  </div>

  <script src="store.js"></script>
  <script src="layout.js"></script>
  <script src="transactions.js"></script>
</body>
</html>
